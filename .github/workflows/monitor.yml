name: AXR Independent Monitor

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 08:00 UTC
  workflow_dispatch: {}    # Manual trigger

permissions:
  contents: write
  issues: write

jobs:
  monitor-poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run AXR Monitor poll
        id: poll
        run: |
          set +e
          OUTPUT=$(node axr-monitor.js poll \
            logs/eco-clean-hu/sth.jsonl \
            keys/sth-public.pem \
            --state monitor/journal.json \
            --anchors logs/eco-clean-hu/anchors.jsonl \
            --log-id axr:eco-clean-hu:v1 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Commit updated journal
        run: |
          git config user.name "AXR Monitor Bot"
          git config user.email "axr-monitor@users.noreply.github.com"
          git add monitor/journal.json
          git diff --staged --quiet || git commit -m "monitor: poll $(date -u +%Y-%m-%dT%H:%M:%SZ) — tree_size=$(jq -r '.max_tree_size // "?"' monitor/journal.json)"
          git push

      - name: Open issue on failure
        if: steps.poll.outputs.exit_code == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.poll.outputs.output }}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `AXR Monitor ALERT — inconsistency detected (${new Date().toISOString().slice(0,10)})`,
              body: `The daily AXR monitor poll detected an inconsistency in the STH stream.\n\n\`\`\`\n${output}\n\`\`\`\n\nThis may indicate equivocation, truncation, or log rewriting. Investigate immediately.\n\nRun locally to confirm:\n\`\`\`bash\nnode axr-monitor.js poll logs/eco-clean-hu/sth.jsonl keys/sth-public.pem --state my-state.json\n\`\`\``,
              labels: ['security', 'axr-monitor']
            });
