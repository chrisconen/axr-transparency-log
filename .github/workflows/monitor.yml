# AXR Transparency Monitor - GitHub Actions (v2 - Fable 5 layout)
# Runs axr-monitor.js poll on the published STH stream daily,
# and preserves the monitor journal as commits.

name: AXR transparency monitor

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch: {}
  push:
    paths:
      - 'sth-hu.jsonl'

permissions:
  contents: write
  issues: write

concurrency:
  group: axr-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Transparency repo checkout
        uses: actions/checkout@v4

      - name: AXR tooling checkout (monitor + core)
        uses: actions/checkout@v4
        with:
          repository: chrisconen/AXR
          path: axr-tools

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Poll the published STH stream
        id: poll
        run: |
          mkdir -p monitor
          set +e
          node axr-tools/axr-monitor.js poll \
            sth-hu.jsonl keys/sth-public.pem \
            --state monitor/monitor-state.json \
            --anchors anchors-hu.jsonl \
            --log-id axr:eco-clean-hu:v1 | tee monitor/last-poll.log
          code=${PIPESTATUS[0]}
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" = "2" ]; then
            echo "::error::Monitor usage error - check workflow or repo structure"
          fi

      - name: Commit the monitor journal
        run: |
          git config user.name  "axr-monitor[bot]"
          git config user.email "axr-monitor@users.noreply.github.com"
          git add monitor/
          if ! git diff --cached --quiet; then
            git commit -m "monitor: poll $(date -u +%Y-%m-%dT%H:%MZ) (exit ${{ steps.poll.outputs.exit_code }})"
            git push
          else
            echo "No journal changes."
          fi

      - name: Open an issue on violation
        if: steps.poll.outputs.exit_code == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="AXR MONITOR ALERT: log violation detected ($(date -u +%Y-%m-%d))"
          existing=$(gh issue list --state open --search "AXR MONITOR ALERT" --json number --jq 'length')
          body="The independent monitor detected a violation in the published STH stream.

          $(tail -40 monitor/last-poll.log)

          Possible causes: EQUIVOCATION, TRUNCATION, NON_APPEND_ONLY, ROOT_MISMATCH, or BAD_SIGNATURE.
          See monitor/ for the witnessed tree heads."
          if [ "$existing" = "0" ]; then
            gh issue create --title "$title" --body "$body" --label "monitor-alert" || gh issue create --title "$title" --body "$body"
          else
            echo "Open monitor-alert issue already exists - skipping."
          fi

      - name: Fail the job on violation
        if: steps.poll.outputs.exit_code != '0'
        run: exit 1
